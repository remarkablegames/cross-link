<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="🔗 Connect the dots. Cross the lines." />
    <meta
      property="og:image"
      content="https://remarkablegames.org/cross-link/cover.png"
    />

    <!--
      manifest.webmanifest provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/src/style.css" />

    <!--
      GitHub Corners. See https://github.com/remarkablemark/github-corners
    -->
    <% if (process.env.BUNDLE !== 'true') { %>
    <script
      src="https://unpkg.com/github-corners/dist/embed.min.js"
      data-href="https://github.com/remarkablegames/cross-link"
      data-target="_blank"
      async
      defer
    ></script>
    <style>
      .github-corner > svg {
        opacity: 0.6;
        transition: opacity 0.4s;
      }
      .github-corner:hover > svg {
        opacity: 1;
      }
      @media (max-width: 800px), (hover: none) {
        .github-corner {
          display: none;
        }
      }
    </style>
    <% } %>

    <title>Cross-Link | remarkablegames</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to play this game.</noscript>
    <script type="module" src="/src/main.ts"></script>

    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script>
      window['ga-disable-%VITE_GOOGLE_ANALYTICS_ID%'] = %DEV%;
      window.dataLayer = window.dataLayer || [];
      window.gtag = function () {
        dataLayer.push(arguments);
      };
      gtag('js', new Date());
      gtag('config', '%VITE_GOOGLE_ANALYTICS_ID%');
    </script>
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=%VITE_GOOGLE_ANALYTICS_ID%"
    ></script>
  </body>
</html>
